<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Compare Transfer Services</title>

<meta name="theme-color" content="#0B1F4A">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-3BT4GY2B36"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config','G-3BT4GY2B36');
</script>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:#F3F6FB;
color:#111827;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.lang span{
cursor:pointer;
margin-left:8px;
padding:5px 10px;
border:1px solid #ddd;
border-radius:20px;
font-size:12px;
}

.card{
background:white;
border-radius:14px;
padding:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

h1{
margin-top:0;
font-size:24px;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th{
text-align:left;
font-size:12px;
color:#6B7280;
padding:10px;
}

.table td{
padding:14px 10px;
border-top:1px solid #eee;
}

.best{
background:#ECFDF5;
}

.bestTag{
background:#10B981;
color:white;
padding:3px 7px;
font-size:11px;
border-radius:8px;
margin-left:6px;
}

.btn{
background:#0B1F4A;
color:white;
padding:10px 14px;
border-radius:8px;
font-size:13px;
text-decoration:none;
}

.footer{
text-align:center;
font-size:12px;
color:#6B7280;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="topbar">

<div>
<strong>Transfer Comparison</strong>
</div>

<div class="lang">
<span onclick="setLang('en')">EN</span>
<span onclick="setLang('zh')">中文</span>
<span onclick="setLang('km')">ខ្មែរ</span>
</div>

</div>

<div class="card">

<h1 id="title">Compare transfer services</h1>

<div id="amountInfo"></div>
<div id="routeInfo"></div>

</div>

<div class="card">

<table class="table">

<thead>

<tr>
<th id="providerLabel">Provider</th>
<th id="feesLabel">Fees</th>
<th id="receiveLabel">Estimated receive</th>
<th></th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div class="footer">

Reference comparison only.

</div>

</div>

<script>

const AFFILIATE_LINKS = {

wise:"https://wise.prf.hn/click/camref:1011l5ECpH",
remitly:"#",
xe:"#"

}

const PROVIDERS=[

{
code:"wise",
fees:4,
name:{
en:"Wise",
zh:"Wise国际汇款",
km:"Wise ផ្ទេរប្រាក់"
},
desc:{
en:"Low fees and real exchange rate",
zh:"手续费低，真实汇率",
km:"ថ្លៃទាប និងអត្រាពិត"
}
},

{
code:"remitly",
fees:7,
name:{
en:"Remitly",
zh:"Remitly汇款",
km:"Remitly ផ្ទេរប្រាក់"
},
desc:{
en:"Fast international transfers",
zh:"国际快速汇款",
km:"ផ្ទេរប្រាក់លឿន"
}
},

{
code:"xe",
fees:5,
name:{
en:"XE Transfer",
zh:"XE国际汇款",
km:"XE ផ្ទេរប្រាក់"
},
desc:{
en:"Global currency provider",
zh:"全球汇率品牌",
km:"ម៉ាកអត្រាប្តូរប្រាក់"
}
}

]

function getParams(){

const url=new URL(window.location.href)

return{

amount:parseFloat(url.searchParams.get("amount"))||1000,
from:url.searchParams.get("from")||"USD",
to:url.searchParams.get("to")||"KHR"

}

}

function calculate(){

const p=getParams()

const rate=4016

document.getElementById("amountInfo").innerText=
"Amount: "+p.amount+" "+p.from

document.getElementById("routeInfo").innerText=
"Route: "+p.from+" → "+p.to

const tbody=document.getElementById("tableBody")

tbody.innerHTML=""

PROVIDERS.forEach((prov,i)=>{

const receive=(p.amount-prov.fees)*rate

const tr=document.createElement("tr")

if(i===0) tr.className="best"

tr.innerHTML=`

<td>

<strong>${prov.name.en}</strong>

${i===0?'<span class="bestTag">Recommended</span>':''}

<div style="font-size:12px;color:#6B7280">${prov.desc.en}</div>

</td>

<td>$${prov.fees}</td>

<td>${receive.toLocaleString()} KHR</td>

<td>

<a class="btn" onclick="goProvider('${prov.code}','${prov.name.en}')">

Check

</a>

</td>

`

tbody.appendChild(tr)

})

}

function goProvider(code,name){

gtag('event','provider_click',{
provider:name
})

const url=AFFILIATE_LINKS[code]||"#"

window.location.href=url

}

calculate()

</script>

</body>
</html>
