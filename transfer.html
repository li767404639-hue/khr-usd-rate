<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Compare Money Transfer Services</title>

<style>

body{
font-family:system-ui,Arial;
background:#F3F6FB;
margin:0;
padding:20px;
}

.container{
max-width:750px;
margin:auto;
}

.card{
background:#fff;
border-radius:16px;
padding:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
margin-bottom:20px;
}

h1{
font-size:20px;
margin-bottom:10px;
}

.sub{
color:#666;
font-size:13px;
margin-bottom:15px;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th{
font-size:12px;
text-align:left;
color:#777;
padding:10px 0;
border-bottom:1px solid #eee;
}

.table td{
padding:14px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

.btn{
background:#0B1F4A;
color:#fff;
padding:10px 16px;
border-radius:10px;
text-decoration:none;
font-size:13px;
display:inline-block;
}

.best{
color:#0A7B34;
font-weight:600;
font-size:12px;
}

.footer{
text-align:center;
font-size:12px;
color:#888;
margin-top:20px;
}

.lang{
margin-bottom:10px;
}

.lang span{
margin-right:8px;
cursor:pointer;
font-size:12px;
}

</style>

</head>

<body>

<div class="container">

<div class="lang">
<span onclick="setLang('en')">EN</span>
<span onclick="setLang('km')">ខ្មែរ</span>
<span onclick="setLang('zh')">中文</span>
</div>

<div class="card">

<h1 id="title">Compare transfer services</h1>

<div class="sub" id="subtitle">
Choose a provider to check fees and send money securely.
</div>

<div id="amountInfo" style="font-size:13px;margin-bottom:12px;color:#444"></div>

<table class="table">

<tr>
<th id="providerLabel">Provider</th>
<th id="speedLabel">Speed</th>
<th id="feesLabel">Fees</th>
<th></th>
</tr>

<tr>

<td>
<strong>Provider A</strong><br>
<span class="best" id="bestTag">Recommended</span>
</td>

<td id="speed1">Minutes</td>

<td id="fee1">Low</td>

<td>
<a href="#" class="btn" onclick="goProvider('A','Provider A')">Visit</a>
</td>

</tr>

<tr>

<td>
<strong>Provider B</strong>
</td>

<td id="speed2">Minutes</td>

<td id="fee2">Medium</td>

<td>
<a href="#" class="btn" onclick="goProvider('B','Provider B')">Visit</a>
</td>

</tr>

<tr>

<td>
<strong>Provider C</strong>
</td>

<td id="speed3">1-2 days</td>

<td id="fee3">Low</td>

<td>
<a href="#" class="btn" onclick="goProvider('C','Provider C')">Visit</a>
</td>

</tr>

</table>

</div>

<div class="footer" id="footer">
This page compares international money transfer services.
</div>

</div>

<script>

const AFFILIATE_LINKS={
A:"#",
B:"#",
C:"#"
}

function goProvider(code,name){

if(typeof gtag==="function"){
gtag("event","provider_click",{
provider:name
})
}

setTimeout(()=>{
window.location.href=AFFILIATE_LINKS[code]
},150)

}

const TEXT={

en:{
title:"Compare transfer services",
subtitle:"Choose a provider to check fees and send money securely.",
provider:"Provider",
speed:"Speed",
fees:"Fees",
recommended:"Recommended",
footer:"This page compares international money transfer services."
},

km:{
title:"ប្រៀបធៀបសេវាផ្ទេរប្រាក់",
subtitle:"ជ្រើសរើសសេវាកម្មដើម្បីពិនិត្យថ្លៃសេវា និងផ្ញើប្រាក់ដោយសុវត្ថិភាព",
provider:"ក្រុមហ៊ុន",
speed:"ល្បឿន",
fees:"ថ្លៃសេវា",
recommended:"ណែនាំ",
footer:"ទំព័រនេះប្រៀបធៀបសេវាផ្ទេរប្រាក់អន្តរជាតិ"
},

zh:{
title:"比较转账服务",
subtitle:"选择服务商查看手续费并安全汇款",
provider:"服务商",
speed:"到账速度",
fees:"手续费",
recommended:"推荐",
footer:"本页面用于比较国际转账服务"
}

}

function setLang(lang){

document.getElementById("title").innerText=TEXT[lang].title
document.getElementById("subtitle").innerText=TEXT[lang].subtitle
document.getElementById("providerLabel").innerText=TEXT[lang].provider
document.getElementById("speedLabel").innerText=TEXT[lang].speed
document.getElementById("feesLabel").innerText=TEXT[lang].fees
document.getElementById("bestTag").innerText=TEXT[lang].recommended
document.getElementById("footer").innerText=TEXT[lang].footer

}

setLang("en")

/* 自动接收金额 */

function readParams(){

const url=new URL(window.location.href)

const amount=url.searchParams.get("amount")
const from=url.searchParams.get("from")
const to=url.searchParams.get("to")

if(amount){

document.getElementById("amountInfo").innerText=
amount+" "+from+" → "+to

}

}

readParams()

</script>

</body>
</html>
